services:
  # ── Backend API (Docker) ──────────────────────────────────────────────────
  - type: web
    name: speedtest-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MAX_UPLOAD_SIZE
        value: 52428800
      - key: RATE_LIMIT_MAX
        value: 100
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: LOG_LEVEL
        value: info
      - key: SERVER_CITY
        value: Oregon
      - key: SERVER_COUNTRY
        value: US
      - key: CORS_ORIGIN
        value: https://speedtest-frontend.onrender.com  # update after frontend deploys
    healthCheckPath: /health

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: speedtest-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -l 3000
    envVars:
      - key: VITE_API_URL
        value: https://speedtest-backend.onrender.com  # update after backend deploys
      - key: NODE_VERSION
        value: 20